name: Publish Docker image to ghcr.io

# Builds the repo-root Dockerfile and publishes the image to GitHub
# Container Registry so external services (Glama, Docker Hub mirrors,
# etc.) can pull a deterministic, versioned hyperd-mcp container.
#
# Triggers:
# - Every push to main (rebuilds :latest)
# - Manual via the Actions tab (workflow_dispatch)
#
# After the first run, the package will appear at
# https://github.com/orgs/hyperd-ai/packages — the visibility must be
# set to Public via that UI for unauthenticated pulls to work.

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/docker-publish.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/hyperd-ai/hyperd-mcp
          tags: |
            type=raw,value=latest
            type=raw,value=1.0.3
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
